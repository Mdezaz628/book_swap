<!DOCTYPE html>
<html>
<head>
  <title>All Books</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div style="margin:20px;">
  <button onclick="goHome()" class="back-btn">← Back to Home</button>
</div>

<h2 style="text-align:center;">📚 All Books</h2>

<!-- 🔍 SEARCH BAR -->
<div style="text-align:center; margin:20px;">
  <input 
    type="text" 
    id="searchInput"
    placeholder="Search books..." 
    style="width:60%; padding:12px; border-radius:8px;"
    oninput="filterBooks()"
  >
</div>

<!-- 📂 CATEGORY FILTER -->
<div class="category-wrapper">

  <select id="categorySelect">
    <option value="">Select Category</option>

    <option value="Engineering">Engineering</option>
    <option value="Novel">Novel</option>
    <option value="School">School</option>
    <option value="Science">Science</option>
    <option value="History">History</option>

    <option value="Other">Other</option>
  </select>

  <input
    type="text"
    id="otherCategory"
    placeholder="Write your category..."
  >

</div>

<!-- 📚 BOOKS -->
<div class="books-grid" id="booksContainer"></div>

<script>
let allBooks = [];
let currentCategory = "All";

async function loadBooks() {
  const res = await fetch("http://localhost:5000/books") ;
  allBooks = await res.json();
  displayBooks(allBooks);
}

function displayBooks(books) {

  const container =
    document.getElementById("booksContainer");

  container.innerHTML = "";

  books.forEach(book => {

    container.innerHTML += `

      <div class="book-card">

        <img
  src="${book.images?.[0] || book.image || 'https://via.placeholder.com/300'}"

onclick="openImage('${book.images?.[0] || book.image}')"

  style="
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:12px 12px 0 0;
    cursor:pointer;
  "
/>

        <div style="padding:15px;">

          <h3 style="
            margin:0;
            font-size:22px;
          ">
            ${book.title}
          </h3>

          <p style="
            color:gray;
            margin:8px 0;
          ">
            ${book.category}
          </p>

          <h4 style="
            color:#ff7a00;
            margin:0 0 12px;
            font-size:24px;
          ">
            ₹${book.price}
          </h4>

          <p style="
            margin-bottom:15px;
            font-size:14px;
          ">
            Seller: ${book.seller}
          </p>

          <button
            onclick="chatWithSeller('${book.seller}')"
            style="
              width:100%;
              padding:10px;
              border:none;
              background:black;
              color:white;
              border-radius:8px;
              cursor:pointer;
            "
          >
            💬 Chat with Seller
          </button>

        </div>

      </div>

    `;

  });

}
// 🔍 SEARCH
function filterBooks() {
  const search = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allBooks.filter(book =>
    book.title.toLowerCase().includes(search) &&
    (currentCategory === "All" || book.category === currentCategory)
  );

  displayBooks(filtered);
}

// 📂 CATEGORY
function filterCategory(cat) {
  currentCategory = cat;
  filterBooks();
}

const categorySelect = document.getElementById("categorySelect");

categorySelect.addEventListener("change", function () {

  const selectedCategory = this.value;

  // OTHER INPUT SHOW
  if (selectedCategory === "Other") {
    document.getElementById("otherCategory").style.display = "block";
  } else {
    document.getElementById("otherCategory").style.display = "none";
  }

  // FILTER BOOKS
  filterCategory(selectedCategory);

});


function goHome() {
  window.location.href = "dashboard.html";
}

function openImage(src) {
  document.getElementById("imageModal").style.display = "flex";
  document.getElementById("fullImage").src = src;
}

function closeImage() {
  document.getElementById("imageModal").style.display = "none";
}

function chatWithSeller(name) {
  localStorage.setItem("chatSeller", name);
  window.location.href = "chat.html";
}

window.onload = loadBooks;
</script>

<div
  id="imageModal"
  style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
  "
  onclick="closeImage()"
>

  <img
    id="fullImage"
    style="
      max-width:90%;
      max-height:90%;
      border-radius:12px;
    "
  />

</div>
</body>
</html>
