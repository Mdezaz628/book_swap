<!DOCTYPE html>
<html>
<head>
  <title>All Books</title>
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      const theme = localStorage.getItem("selectedTheme") || "light";
      window.addEventListener("DOMContentLoaded", () => {
        document.body.classList.add("all-books-page", theme + "-theme");
      });
    })();
  </script>
</head>
<body class="all-books-page">

<div style="margin:20px; display:flex; align-items:center; justify-content:flex-start; gap:16px; flex-wrap:wrap;">
  <div class="nav-logo" style="font-size:1.2rem; margin-right:8px;">
    <div class="logo-icon"><img src="logo.svg" alt="SwapTome logo" class="logo-image"></div>
    SWAP<span>TOME</span>
  </div>
  <button onclick="goHome()" class="back-btn">← Back to Home</button>
</div>

<h2 style="text-align:center;">📚 All Books</h2>

<!-- 🔍 SEARCH BAR -->
<div style="text-align:center; margin:20px;">
  <input 
    type="text" 
    id="searchInput"
    placeholder="Search books..." 
    class="all-books-search-input"
    oninput="filterBooks()"
  >
</div>

<!-- 📂 CATEGORY FILTER -->
<div class="category-wrapper">

  <select id="categorySelect">
    <option value="">Select Category</option>

    <option value="Engineering">Engineering</option>
    <option value="MBA/Commerce">MBA/Commerce</option>
    <option value="Fiction/Others">Fiction/Others</option>
    <option value="Novel">Novel</option>
    <option value="Medical">Medical</option>
    <option value="School">School</option>

    <option value="Other">Other</option>
  </select>

  <input type="text" id="otherCategory" placeholder="Write your category..." style="display:none;">

</div>

<!-- 📚 BOOKS -->
<div class="books-grid" id="booksContainer"></div>

<script>
let allBooks = [];
let currentCategory = "All";
let selectedSeller = new URLSearchParams(window.location.search).get("seller") || "";
let highlightBookId = new URLSearchParams(window.location.search).get("bookId") || "";
let currentUser = (localStorage.getItem("userName") || selectedSeller || "").trim();

function normalizeText(value) {
  return String(value || "").trim().toLowerCase().replace(/\s+/g, " ");
}

function getActiveCategoryFilter() {
  const categorySelect = document.getElementById("categorySelect");
  const otherCategoryInput = document.getElementById("otherCategory");
  const selectedCategory = categorySelect?.value || "";

  if (selectedCategory === "Other") {
    return normalizeText(otherCategoryInput?.value || "");
  }

  return normalizeText(selectedCategory);
}

function canManageBook(book) {
  const ownerName = (currentUser || selectedSeller || "").trim();
  return !!ownerName && (book.seller || "").trim() === ownerName;
}

function resolveBookImageSrc(imagePath) {
  if (!imagePath) return 'https://via.placeholder.com/300';
  const normalizedPath = String(imagePath).replace(/\\/g, '/').trim();
  if (/^https?:\/\//i.test(normalizedPath) || normalizedPath.startsWith('data:') || normalizedPath.includes('cloudinary.com')) {
    return normalizedPath;
  }
  if (normalizedPath.startsWith('/') || normalizedPath.startsWith('uploads/')) {
    return `https://swaptome-api.onrender.com${normalizedPath.startsWith('/') ? '' : '/'}${normalizedPath}`;
  }
  return `https://swaptome-api.onrender.com/uploads/${normalizedPath}`;
}

async function loadBooks() {
  const res = await fetch("https://swaptome-api.onrender.com/api/books") ;
  allBooks = (await res.json()).slice().sort((a, b) => Number(Boolean(b.featured)) - Number(Boolean(a.featured)));

  if (selectedSeller) {
    const heading = document.querySelector("h2[style*='text-align:center']");
    if (heading) heading.textContent = `📚 Uploads by ${selectedSeller}`;
  }

  filterBooks();
}

function displayBooks(books) {

  const container =
    document.getElementById("booksContainer");

  container.innerHTML = "";

  books.forEach(book => {
    const featuredBadge = book.featured ? `<span class="book-badge featured">${book.featured}</span>` : '';

    container.innerHTML += `

      <div id="book-${book._id}" class="book-card all-books-card">

        <img
  src="${resolveBookImageSrc(book.images?.[0] || book.image)}"

onclick="openImageGallery('${encodeURIComponent(JSON.stringify(book.images || [book.image]))}')"

  class="all-books-card-image"
/
>

        <div class="all-books-card-body">

          <div class="book-badges">
            ${featuredBadge}
          </div>

          <h3 class="all-books-card-title">
            ${book.title}
          </h3>

          <p class="all-books-card-category">
            ${book.category}
          </p>

          <h4 class="all-books-card-price">
            ₹${book.price}
          </h4>

          <p class="all-books-card-seller">
            Seller: ${book.seller}
          </p>

          <div class="all-books-location-row">
            <p class="all-books-card-location">
              📍 ${book.location || 'Location not shared'}
            </p>

            ${canManageBook(book) ? `
              <div class="all-books-menu-wrap">
                <button class="all-books-menu-btn" onclick="toggleBookMenu('${book._id}', event)" aria-label="Book options">⋮</button>
                <div class="all-books-menu" id="bookMenu-${book._id}">
                  <button onclick="changeBookPrice('${book._id}', ${Number(book.price) || 0})" class="all-books-menu-item">Change Price</button>
                  <button onclick="deleteBook('${book._id}')" class="all-books-menu-item danger">Delete Book</button>
                </div>
              </div>
            ` : ''}
          </div>

          ${!canManageBook(book) ? `
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
              <button
                onclick="chatWithSeller('${book.seller}')"
                class="all-books-chat-btn"
              >
                💬 Chat with Seller
              </button>
              <button
                onclick='openReportModal("book", ${JSON.stringify(book.title)}, ${JSON.stringify(book.seller)})'
                class="all-books-chat-btn"
                style="background:#fff;color:#0f2b5b;border:1px solid #9fb8f3;"
              >
                Report Book
              </button>
            </div>
          ` : ''}

        </div>

      </div>

    `;

  });

  // If a specific bookId was requested, scroll to and highlight it
  if (highlightBookId) {
    const el = document.getElementById('book-' + highlightBookId);
    if (el) {
      setTimeout(() => {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.add('highlight-book');
        setTimeout(() => el.classList.remove('highlight-book'), 3500);
      }, 250);
    }
  }

}
// 🔍 SEARCH
function filterBooks() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const activeCategory = getActiveCategoryFilter();

  const filtered = allBooks.filter(book =>
    (!selectedSeller || (book.seller || "").trim() === selectedSeller.trim()) &&
    book.title.toLowerCase().includes(search) &&
    (
      currentCategory === "All" ||
      (currentCategory === "Other" ? (!activeCategory || normalizeText(book.category).includes(activeCategory)) : normalizeText(book.category) === normalizeText(currentCategory))
    )
  );

  displayBooks(filtered);
}

// 📂 CATEGORY
function filterCategory(cat) {
  currentCategory = cat;
  filterBooks();
}

const categorySelect = document.getElementById("categorySelect");
const otherCategoryInput = document.getElementById("otherCategory");

if (otherCategoryInput) {
  otherCategoryInput.addEventListener("input", () => {
    if (categorySelect?.value === "Other") {
      currentCategory = "Other";
      filterBooks();
    }
  });
}

categorySelect.addEventListener("change", function () {

  const selectedCategory = this.value;

  // OTHER INPUT SHOW
  if (selectedCategory === "Other") {
    if (otherCategoryInput) otherCategoryInput.style.display = "block";
  } else {
    if (otherCategoryInput) otherCategoryInput.style.display = "none";
    if (otherCategoryInput) otherCategoryInput.value = "";
  }

  // FILTER BOOKS
  currentCategory = selectedCategory || "All";
  filterBooks();

});


function goHome() {
  window.location.href = "dashboard.html";
}

function setSellerFilterFromQuery() {
  if (!selectedSeller) return;
  const searchInput = document.getElementById("searchInput");
  if (searchInput) searchInput.placeholder = `Search uploads by ${selectedSeller}...`;
}

document.addEventListener("DOMContentLoaded", () => {
  setSellerFilterFromQuery();
});

function toggleBookMenu(bookId, event) {
  if (event) event.stopPropagation();

  const menu = document.getElementById(`bookMenu-${bookId}`);
  if (!menu) return;

  document.querySelectorAll('.all-books-menu.show').forEach((openMenu) => {
    if (openMenu !== menu) openMenu.classList.remove('show');
  });

  menu.classList.toggle('show');
}

async function deleteBook(bookId) {
  if (!confirm("Delete this book?")) return;

  const ownerName = (currentUser || selectedSeller || "").trim();

  const res = await fetch(`https://swaptome-api.onrender.com/api/books/${bookId}?seller=${encodeURIComponent(ownerName)}`, {
    method: "DELETE"
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    alert(data.message || "Could not delete book");
    return;
  }

  allBooks = allBooks.filter(book => book._id !== bookId);
  filterBooks();
}

async function changeBookPrice(bookId, currentPrice) {
  const nextPrice = prompt("Enter new price", String(currentPrice));
  if (nextPrice === null) return;

  const ownerName = (currentUser || selectedSeller || "").trim();

  const parsedPrice = Number(nextPrice);
  if (!parsedPrice || parsedPrice <= 0) {
    alert("Enter a valid price");
    return;
  }

  const res = await fetch(`https://swaptome-api.onrender.com/api/books/${bookId}/price`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ price: parsedPrice, seller: ownerName })
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    alert(data.message || "Could not update price");
    return;
  }

  const book = allBooks.find(item => item._id === bookId);
  if (book) book.price = parsedPrice;
  filterBooks();
}

function openImage(src) {
  document.getElementById("imageModal").style.display = "flex";
  document.getElementById("fullImage").src = src;
}

function closeImage() {
  document.getElementById("imageModal").style.display = "none";
}

// Gallery: open array of images (encoded JSON)
let galleryImages = [];
let galleryIndex = 0;

function openImageGallery(encoded) {
  try {
    const arr = JSON.parse(decodeURIComponent(encoded));
    if (!Array.isArray(arr) || arr.length === 0) {
      alert('No images available');
      return;
    }
    galleryImages = arr;
    galleryIndex = 0;
    renderGallery();
    document.getElementById('imageModal').style.display = 'flex';
  } catch (e) {
    console.warn('Could not parse gallery images', e);
    openImage(decodeURIComponent(encoded));
  }
}

function renderGallery() {
  const imgEl = document.getElementById('fullImage');
  if (!imgEl) return;
  imgEl.src = resolveBookImageSrc(galleryImages[galleryIndex]);
  const counter = document.getElementById('galleryCounter');
  if (counter) counter.textContent = `${galleryIndex + 1} / ${galleryImages.length}`;
}

function galleryNext(e) {
  if (e) e.stopPropagation();
  if (!galleryImages.length) return;
  galleryIndex = (galleryIndex + 1) % galleryImages.length;
  renderGallery();
}

function galleryPrev(e) {
  if (e) e.stopPropagation();
  if (!galleryImages.length) return;
  galleryIndex = (galleryIndex - 1 + galleryImages.length) % galleryImages.length;
  renderGallery();
}

function chatWithSeller(name) {
  localStorage.setItem("chatSeller", name);
    window.location.href = `chat.html?seller=${encodeURIComponent(name)}`;
}

function openReportModal(type, targetLabel, targetUser) {
  const modal = document.getElementById('reportModal');
  if (!modal) return;
  document.getElementById('reportType').value = type || 'book';
  document.getElementById('reportTargetLabel').value = targetLabel || '';
  document.getElementById('reportTargetUser').value = targetUser || '';
  document.getElementById('reporterName').value = localStorage.getItem('userName') || '';
  document.getElementById('reporterEmail').value = localStorage.getItem('email') || '';
  modal.style.display = 'flex';
}

function closeReportModal() {
  const modal = document.getElementById('reportModal');
  if (modal) modal.style.display = 'none';
}

async function submitReport() {
  const type = document.getElementById('reportType').value;
  const targetLabel = document.getElementById('reportTargetLabel').value.trim();
  const targetUser = document.getElementById('reportTargetUser').value.trim();
  const reason = document.getElementById('reportReason').value;
  const details = document.getElementById('reportDetails').value.trim();
  const reporterName = document.getElementById('reporterName').value.trim() || 'Anonymous';
  const reporterEmail = document.getElementById('reporterEmail').value.trim();

  if (!reason || !details) {
    alert('Please add reason and details');
    return;
  }

  const res = await fetch('https://swaptome-api.onrender.com/reports', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      type,
      targetId: '',
      targetLabel: targetLabel || targetUser,
      reporterName,
      reporterEmail,
      reason,
      details,
      createdBy: reporterEmail || reporterName
    })
  });

  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    alert(data.message || 'Could not submit report');
    return;
  }

  alert('Report submitted ✅');
  closeReportModal();
}

window.onload = loadBooks;
window.addEventListener("DOMContentLoaded", setSellerFilterFromQuery);
document.addEventListener('click', () => {
  document.querySelectorAll('.all-books-menu.show').forEach((menu) => menu.classList.remove('show'));
});
</script>

<div id="reportModal" style="display:none;position:fixed;inset:0;background:rgba(10,14,22,0.65);backdrop-filter:blur(8px);z-index:10000;align-items:center;justify-content:center;padding:16px;">
  <div style="width:min(100%,520px);background:#fff;border-radius:20px;padding:20px;box-shadow:0 30px 70px rgba(0,0,0,.3);">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;">
      <strong style="font-size:1.1rem;">Report Book</strong>
      <button onclick="closeReportModal()" style="background:transparent;border:none;font-size:24px;cursor:pointer;">✕</button>
    </div>
    <div style="display:grid;gap:12px;">
      <input id="reporterName" placeholder="Your name" style="padding:12px 14px;border:1px solid #d6dbe5;border-radius:12px;">
      <input id="reporterEmail" placeholder="Your email" style="padding:12px 14px;border:1px solid #d6dbe5;border-radius:12px;">
      <input id="reportTargetLabel" placeholder="Book title" style="padding:12px 14px;border:1px solid #d6dbe5;border-radius:12px;">
      <input id="reportTargetUser" placeholder="Seller name" style="padding:12px 14px;border:1px solid #d6dbe5;border-radius:12px;">
      <select id="reportType" style="padding:12px 14px;border:1px solid #d6dbe5;border-radius:12px;"><option value="book">Fake book</option><option value="user">Scam user</option></select>
      <select id="reportReason" style="padding:12px 14px;border:1px solid #d6dbe5;border-radius:12px;"><option>Fake listing</option><option>Scam / fraud</option><option>Spam</option><option>Other</option></select>
      <textarea id="reportDetails" rows="4" placeholder="Describe what happened" style="padding:12px 14px;border:1px solid #d6dbe5;border-radius:12px;resize:vertical;"></textarea>
      <button onclick="submitReport()" style="padding:12px 14px;border:none;border-radius:12px;background:linear-gradient(135deg,#0f2b5b 0%,#1d4ed8 100%);color:#fff;font-weight:800;cursor:pointer;">Submit Report</button>
    </div>
  </div>
</div>

<div
  id="imageModal"
  style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    justify-content:center;
    align-items:center;
    z-index:9999;
  "
  onclick="closeImage()"
>

  <div
    onclick="event.stopPropagation()"
    style="
      position:relative;
      width:min(92vw, 760px);
      max-height:86vh;
      background:rgba(10,14,22,0.98);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:16px;
      box-shadow:0 24px 60px rgba(0,0,0,0.45);
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
      justify-content:center;
    "
  >
    <div style="display:flex; width:100%; justify-content:space-between; align-items:center; gap:12px; color:#fff; font-weight:700;">
      <span>Image Preview</span>
      <span id="galleryCounter"></span>
      <button onclick="closeImage()" style="background:transparent; color:#fff; border:none; font-size:24px; cursor:pointer; line-height:1;">✕</button>
    </div>

    <div style="display:flex; align-items:center; gap:10px; width:100%; justify-content:center;">
      <button onclick="galleryPrev(event)" style="background:rgba(255,255,255,0.08); color:white; border:none; width:44px; height:44px; border-radius:50%; font-size:24px; cursor:pointer;">‹</button>

      <img
        id="fullImage"
        style="
          width:100%;
          max-width:680px;
          max-height:68vh;
          object-fit:contain;
          border-radius:14px;
          background:#000;
        "
      />

      <button onclick="galleryNext(event)" style="background:rgba(255,255,255,0.08); color:white; border:none; width:44px; height:44px; border-radius:50%; font-size:24px; cursor:pointer;">›</button>
    </div>
  </div>

</div>
</body>
</html>
