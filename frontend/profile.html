<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>My Profile</title>

<link
  rel="stylesheet"
  href="style.css"
/>

<style>

:root{

  --profile-bg: linear-gradient(180deg, #0f172a 0%, #111827 100%);

  --profile-panel: rgba(255,255,255,.05);

  --profile-panel-2: rgba(255,255,255,.06);

  --profile-text: #ffffff;

  --profile-muted: #aaa;

  --profile-input: #1e293b;

  --profile-border: rgba(255,255,255,.08);

  --profile-accent: #ff9800;

  --profile-accent-2: #ff00c8;

}

body.light-theme{

  --profile-bg: linear-gradient(180deg, #f7f3ec 0%, #efe4d2 100%);

  --profile-panel: rgba(255,255,255,.88);

  --profile-panel-2: rgba(255,255,255,.96);

  --profile-text: #1a1208;

  --profile-muted: #6b7280;

  --profile-input: #ffffff;

  --profile-border: rgba(0,0,0,.08);

}

body.dark-theme{

  --profile-bg: linear-gradient(180deg, #020617 0%, #0f172a 100%);

  --profile-panel: rgba(15,23,42,.88);

  --profile-panel-2: rgba(30,41,59,.92);

  --profile-text: #e5eefc;

  --profile-muted: #94a3b8;

  --profile-input: #0f172a;

  --profile-border: rgba(255,255,255,.08);

}

body.blue-theme{

  --profile-bg: linear-gradient(180deg, #eaf2ff 0%, #dbeafe 100%);

  --profile-panel: rgba(255,255,255,.9);

  --profile-panel-2: rgba(255,255,255,.98);

  --profile-text: #0b2a66;

  --profile-muted: #37579e;

  --profile-input: #ffffff;

  --profile-border: rgba(37,99,235,.12);

}

body{

  margin:0;

  font-family:sans-serif;

  background:var(--profile-bg);

  color:var(--profile-text);

}

/* PAGE */

.profile-page{

  max-width:700px;

  margin:40px auto;

  background:var(--profile-panel);

  border:1px solid var(--profile-border);

  border-radius:24px;

  padding:32px;

  backdrop-filter:blur(14px);

}


/* HEADER */

.profile-header{

  display:flex;

  flex-direction:column;

  align-items:center;

  gap:14px;

  margin-bottom:30px;

}

/* IMAGE */

.profile-pic{

  width:130px;

  height:130px;

  border-radius:50%;

  object-fit:cover;

  border:4px solid var(--profile-accent);

}

/* UPLOAD */

.upload-btn{

  background:var(--profile-accent);

  border:none;

  color:white;

  padding:10px 18px;

  border-radius:12px;

  cursor:pointer;

  font-weight:600;

}

.profile-controls{

  display:flex;

  justify-content:flex-end;

  margin:0 0 18px;

}

.profile-theme-select{

  padding:10px 14px;

  border-radius:12px;

  border:1px solid var(--profile-border);

  background:var(--profile-input);

  color:var(--profile-text);

  outline:none;

}

/* INFO */

.profile-info{

  display:grid;

  gap:18px;

}

.info-box{

  background:var(--profile-panel-2);

  padding:18px;

  border-radius:16px;

}

.info-box label{

  display:block;

  margin-bottom:8px;

  color:var(--profile-muted);

}

.info-box input{

  width:100%;

  padding:12px;

  border:none;

  border-radius:10px;

  outline:none;

  background:var(--profile-input);

  color:var(--profile-text);

}

/* SAVE */

.save-btn{

  width:100%;

  margin-top:24px;

  padding:14px;

  border:none;

  border-radius:14px;

  background:linear-gradient(
    90deg,
    var(--profile-accent),
    var(--profile-accent-2)
  );

  color:white;

  font-size:16px;

  font-weight:700;

  cursor:pointer;

}

</style>

</head>

<body>

<div class="profile-page">

  <button
    class="back-btn"
    onclick="history.back()"
  >
    ← Back
  </button>

  <div class="profile-controls">
    <select id="profileThemeSelect" class="profile-theme-select">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
      <option value="blue">Blue</option>
    </select>
  </div>

  <!-- HEADER -->

  <div class="profile-header">

    <img
      id="profileImage"
      class="profile-pic"
      src="https://via.placeholder.com/130"
    >

    <input
      type="file"
      id="imageUpload"
      accept="image/*"
      hidden
    >

    <button
      class="upload-btn"
      onclick="document.getElementById('imageUpload').click()"
    >
      Upload Photo
    </button>

  </div>

  <!-- INFO -->

  <div class="profile-info">

    <div class="info-box">

      <label>Full Name</label>

      <input
        type="text"
        id="profileName"
      >

    </div>

    <div class="info-box">

      <label>Email</label>

      <input
        type="email"
        id="profileEmail"
      >

    </div>

    <div class="info-box">

      <label>College</label>

      <input
        type="text"
        id="profileCollege"
        required
      >

    </div>

    <div class="info-box">

      <label>Location</label>

      <input
        type="text"
        id="profileLocation"
        placeholder="Mumbai, Maharashtra"
        required
      >

    </div>

  </div>

  <button
    class="save-btn"
    onclick="saveProfile()"
  >
    Save Profile
  </button>

</div>

<script>

function getProfileStorageIdentity(){
  const email = (localStorage.getItem("email") || "").trim().toLowerCase();
  const userName = (localStorage.getItem("userName") || "").trim().toLowerCase();

  return email || userName || "guest";
}

function getProfileImageStorageKey(identity){
  return `profileImage:${String(identity || getProfileStorageIdentity()).replace(/[^a-z0-9_-]+/gi, "_")}`;
}

function loadProfileImageForCurrentUser(){
  const scopedKey = getProfileImageStorageKey();
  const savedImage = localStorage.getItem(scopedKey);

  if (savedImage) {
    document.getElementById("profileImage").src = savedImage;
  }
}

function applyProfileTheme(theme){
  document.body.classList.remove("light-theme", "dark-theme", "blue-theme");
  document.body.classList.add(`${theme}-theme`);
  localStorage.setItem("selectedTheme", theme);
}

/* LOAD DATA */

window.onload = () => {

  const savedTheme = localStorage.getItem("selectedTheme") || "light";
  const themeSelect = document.getElementById("profileThemeSelect");

  applyProfileTheme(savedTheme);

  if (themeSelect) {
    themeSelect.value = savedTheme;
    themeSelect.addEventListener("change", (event) => applyProfileTheme(event.target.value));
  }

  document.getElementById(
    "profileName"
  ).value =
    localStorage.getItem(
      "userName"
    ) || "";

  document.getElementById(
    "profileEmail"
  ).value =
    localStorage.getItem(
      "email"
    ) || "";

  document.getElementById(
    "profileCollege"
  ).value =
    localStorage.getItem(
      "college"
    ) || "";

  document.getElementById(
    "profileLocation"
  ).value =
    localStorage.getItem(
      "location"
    ) || "";

  loadProfileImageForCurrentUser();

};

/* SAVE */

function saveProfile(){

  const locationValue = document.getElementById(
    "profileLocation"
  ).value.trim();

  if (!locationValue) {
    alert("Location is required ❗");
    document.getElementById("profileLocation").focus();
    return;
  }

  localStorage.setItem(
    "userName",
    document.getElementById(
      "profileName"
    ).value
  );

  localStorage.setItem(
    "email",
    document.getElementById(
      "profileEmail"
    ).value
  );

  localStorage.setItem(
    "college",
    document.getElementById(
      "profileCollege"
    ).value
  );

  localStorage.setItem(
    "location",
    locationValue
  );

  const profileImageElement = document.getElementById(
    "profileImage"
  );
  const scopedKey = getProfileImageStorageKey();

  localStorage.setItem(
    scopedKey,
    profileImageElement ? profileImageElement.src : ""
  );

  alert("Profile Saved ✅");

}

/* IMAGE UPLOAD */

document.getElementById(
  "imageUpload"
).addEventListener(
  "change",
  function(e){

    const file =
      e.target.files[0];

    const reader =
      new FileReader();

    reader.onload = function(){

      const imageData =
        reader.result;

      document.getElementById(
        "profileImage"
      ).src = imageData;

      localStorage.setItem(
        getProfileImageStorageKey(),
        imageData
      );

    };

    reader.readAsDataURL(file);

  }
);

</script>

</body>
</html>
